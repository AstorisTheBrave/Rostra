version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      prefix-development: build
      include: scope
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions workflow versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
