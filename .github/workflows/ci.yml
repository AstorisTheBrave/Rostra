name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Guard against legacy embeds (Components V2 only)
        run: |
          if grep -rn "EmbedBuilder" src; then
            echo "::error::EmbedBuilder found — this project uses Components V2 only."
            exit 1
          fi
