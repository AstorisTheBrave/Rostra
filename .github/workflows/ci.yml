name: CI

# Opt JS actions into the Node 24 runner ahead of the June 2026 cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal token scope: this workflow only reads the checkout.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so the cached env config loads during typecheck/tests.
      DISCORD_TOKEN: ci-placeholder-token
      DISCORD_CLIENT_ID: "0"
      DATABASE_URL: postgresql://user:pass@localhost:5432/rostra
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          # Node 22+: the built-in test runner expands the `src/**/*.test.ts` glob.
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Guard against legacy embeds (Components V2 only)
        run: |
          if grep -rn "EmbedBuilder" src; then
            echo "::error::EmbedBuilder found - this project uses Components V2 only."
            exit 1
          fi
      - name: Guard undercover mode (no AI provider names)
        run: |
          if grep -rinE "openai|anthropic|claude|groq|\bgpt\b|gemini|\bllama\b|mistral" src; then
            echo "::error::AI provider reference found - undercover mode forbids this."
            exit 1
          fi
      - name: Guard UI library (modules must not hand-roll component builders)
        run: |
          if grep -rnE "new (ButtonBuilder|ActionRowBuilder|ContainerBuilder|StringSelectMenuBuilder|ModalBuilder|TextInputBuilder)" src/modules; then
            echo "::error::Module hand-rolls a component builder - use @/ui instead."
            exit 1
          fi
